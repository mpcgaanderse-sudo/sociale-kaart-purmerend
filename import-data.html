        async function startImport() {
            const btn = document.getElementById('btn-import');
            btn.disabled = true;
            document.getElementById('log').innerHTML = '';

            log('🚀 Start import van ' + zorgverleners.length + ' zorgverleners...');

            let success = 0;
            let errors = 0;

            for (const zv of zorgverleners) {
                try {
                    await db.collection('zorgverleners').add(zv);
                    log(`✓ ${zv.naam} toegevoegd`, 'success');
                    success++;
                } catch (err) {
                    log(`✗ Fout bij ${zv.naam}: ${err.message}`, 'error');
                    errors++;
                }
                // Kleine pauze om Firebase niet te overbelasten
                await new Promise(r => setTimeout(r, 100));
            }

            log('');
            log(`📊 Import voltooid: ${success} succesvol, ${errors} fouten`, success > 0 ? 'success' : 'error');
            log('Je kunt nu terug naar index.html om de zorgverleners te bekijken!');

            btn.disabled = false;
        }

        async function clearDatabase() {
            if (!confirm('Weet je zeker dat je ALLE zorgverleners wilt verwijderen?')) return;

            const btn = document.getElementById('btn-clear');
            btn.disabled = true;
            document.getElementById('log').innerHTML = '';

            log('🗑️ Database legen...');

            try {
                const snapshot = await db.collection('zorgverleners').get();
                let count = 0;
                for (const doc of snapshot.docs) {
                    await doc.ref.delete();
                    count++;
                }
                log(`✓ ${count} zorgverleners verwijderd`, 'success');
            } catch (err) {
                log(`✗ Fout: ${err.message}`, 'error');
            }

            btn.disabled = false;
        }
